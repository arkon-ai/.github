name: Claude Security Review

# Dedicated security-only pass on every PR. Runs alongside the general
# Claude Auto Review (claude-review.yml). $0 — reuses the subscription
# OAuth token, no metered API key. Wired by Warden 2026-05-27 per Brynn's
# Claude-Code security-tooling audit (Layer 3 of the 3-layer model:
# real-time security-guidance plugin -> local /security-review -> this CI gate).

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  security-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "*"
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR: ${{ github.event.pull_request.number }}

            You are a SECURITY-ONLY reviewer. Ignore style, naming,
            formatting, and general code-quality nits — the separate
            Claude Auto Review handles those. Review the PR diff strictly
            for security vulnerabilities, OWASP Top 10 aligned:

            - Injection: SQL, command, template, LDAP, header, log
            - Broken auth / session handling; missing or wrong authz checks
            - Insecure Direct Object Reference (IDOR) / missing tenant scoping
            - SSRF, unsafe outbound requests, open redirects
            - Hardcoded secrets, tokens, credentials, private keys in code
            - Unsafe deserialization (pickle, eval, new Function, YAML load)
            - Dangerous shell/exec: child_process.exec, os.system, backticks
            - XSS: dangerouslySetInnerHTML, innerHTML, unescaped template output
            - Weak crypto, predictable randomness, missing TLS verification
            - Sensitive data in logs; missing input validation on external data
            - Path traversal, arbitrary file read/write
            - CI/CD risks: untrusted pull_request_target, script injection in
              GitHub Actions expressions

            For each finding, post an inline comment with:
              SEVERITY (CRITICAL | HIGH | MEDIUM | LOW), the vulnerability
              class, why it is exploitable, and a concrete fix.
            Prefer false-negative avoidance on CRITICAL/HIGH; suppress
            low-confidence MEDIUM/LOW noise. If the diff is clean, post a
            single top-level comment: "Security review: no findings."

            Use `mcp__github_inline_comment__create_inline_comment` for
            specific code issues. Use `gh pr comment` for the summary.
            Only post GitHub comments — do not submit review text as messages.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
